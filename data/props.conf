# Praxis sourcetype definitions.
# Copy this file to: %SPLUNK_HOME%\etc\system\local\props.conf
# (or an app's local\ directory) and restart Splunk BEFORE ingesting,
# so timestamps and key=value fields are extracted correctly.

[praxis:auth]
SHOULD_LINEMERGE = false
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 19
KV_MODE = auto

[praxis:network]
SHOULD_LINEMERGE = false
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 19
KV_MODE = auto

[praxis:endpoint]
SHOULD_LINEMERGE = false
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 19
KV_MODE = auto

[praxis:egress]
SHOULD_LINEMERGE = false
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%d %H:%M:%S
MAX_TIMESTAMP_LOOKAHEAD = 19
KV_MODE = auto
