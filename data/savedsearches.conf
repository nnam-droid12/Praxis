# Praxis low-severity alerts.
# Copy to: %SPLUNK_HOME%\etc\apps\search\local\savedsearches.conf
# (or your own app's local\ directory) and restart Splunk.
#
# Each search is individually LOW severity. The planted campaign trips
# all 5; the Praxis multi-agent investigation correlates them into one
# CRITICAL verdict. Each search may also fire on benign noise/false-alarm
# events - that is intentional and gives the Devil's Advocate real work.

[Praxis - Impossible Travel Login]
search = search index=main sourcetype=praxis:auth action=login status=success geo_velocity_kmh>1000
dispatch.earliest_time = -60m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert.severity = 2
counttype = number of events
relation = greater than
quantity = 0
alert.track = 1

[Praxis - MFA Fatigue Pattern]
search = search index=main sourcetype=praxis:auth action=mfa_challenge status=denied | bucket _time span=5m | stats count by user, _time | where count>=4
dispatch.earliest_time = -60m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert.severity = 2
counttype = number of events
relation = greater than
quantity = 0
alert.track = 1

[Praxis - Lateral Movement Multi-Protocol to File Server]
search = search index=main sourcetype=praxis:network dest_role=file_server (protocol=SMB OR protocol=RDP) | bucket _time span=10m | stats dc(protocol) as protocol_count values(protocol) as protocols by user, src_host, dest_host, _time | where protocol_count>=2
dispatch.earliest_time = -60m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
alert.severity = 2
counttype = number of events
relation = greater than
quantity = 0
alert.track = 1

