# Praxis Alert Action — Feature 9.
# Copy splunk_app/praxis_alert_action/ to %SPLUNK_HOME%\etc\apps\ and restart
# Splunk, then add `praxis_investigate` to the `actions` of any
# "Praxis - *" saved search (see ../README.md).

[praxis_investigate]
is_custom = 1
label = Praxis: Run Multi-Agent Investigation
description = For each distinct user in the triggering search results, fans out to Praxis's 5 specialist agents and writes the Correlation Lead's verdict back to Splunk as sourcetype=praxis:verdict.
payload_format = json
alert.execute.cmd = praxis_investigate.py

# Field in the triggering search results that identifies the user to investigate.
param.user_field = user

# How far back each specialist agent should search.
param.earliest_time = -24h
