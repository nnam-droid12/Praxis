# Praxis Alert Action — Feature 9.
# Copy this whole splunk_app/praxis_alert_action/ directory to:
#   %SPLUNK_HOME%\etc\apps\praxis_alert_action\
# and restart Splunk (or POST to /debug/refresh) to register the action.

[install]
is_configured = 0
state = enabled

[ui]
is_visible = 0
label = Praxis Alert Action

[launcher]
author = Praxis
description = Custom alert action that fans out to Praxis's 5 specialist agents for the user(s) in a triggered "Praxis - *" alert, then writes the Correlation Lead's verdict back to Splunk as sourcetype=praxis:verdict.
version = 1.0.0
